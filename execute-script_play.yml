- hosts: leihs_server
  # NOTE: those vars need to be set. they are listed here for reference but its recommended to define them on the command line,
  # example: $ bin/ansible-playbook -i ../zhdk-inventory/test-hosts execute-script_play.yml -e 'script_file=/tmp/myscript.rb'
  vars:
    script_file_path: "{{ script_file | mandatory }}"
    script_args_string: "{{ script_args | default('') }}"
    # import_file_path: "{{ import_file }}"
    # shared_scripts_dir_path: "{{ shared_scripts_dir }}"
    local_log_dir_path: "{{ local_log_dir | default('log') }}"
    # internal helper vars
    logfile_name: "leihs-script.{{ansible_date_time.iso8601_basic_short}}.log.txt"
    logfile_path: "/tmp/{{logfile_name}}"
    local_logfile_path: "{{local_log_dir_path}}/{{ansible_hostname}}/{{logfile_name}}"
    script_user: "{{leihs_legacy_user}}"

  tasks:
    - name: copy import file
      copy:
        src: "{{import_file_path}}"
        dest: /tmp/leihs-import
      when: import_file_path is defined

    - name: created /tmp/leihs-scripts directory
      file:
        path: /tmp/leihs-scripts
        state: directory

    - name: copy shared script files
      copy:
        src: ../zhdk-inventory/scripts/shared/
        dest: /tmp/leihs-scripts/shared/
      when: shared_scripts_dir_path is defined

    - name: copy script file
      copy:
        src: "{{script_file_path}}"
        dest: /tmp/leihs-scripts/script.rb

    - name: create log file
      file:
        path: "{{logfile_path}}"
        state: touch
        owner: "{{script_user}}"
      register: server_logfile

    # NOTE: the env (vars) should match /etc/systemd/system/leihs-legacy.service,
    #       except the log level which can be higher!
    - name: run rails script
      ignore_errors: True
      become: yes
      become_user: "{{script_user}}"
      register: run_script_results
      shell: |
        export PATH=$HOME/.rubies/ruby-{{leihs_database_ruby_version}}/bin:/usr/lib/postgresql/{{postgres_version}}/bin:$PATH
        export LEIHS_SECRET={{leihs_master_secret}}
        set -eux
        export RAILS_ENV=production
        export LEIHS_SEND_MAILS=True
        export RAILS_LOG_LEVEL=INFO
        cd /leihs/legacy
        ruby -S bundle exec rails runner /tmp/leihs-scripts/script.rb {{script_args_string}}
    
    - name: make log text
      set_fact:
        run_script_log: |
         ## STDOUT

         ```
         {{run_script_results.stdout}}
         ```
         
         ## STDERR

         ```
         {{run_script_results.stderr}}
         ```

         ## RESULT
         
         SCRIPT RESULT WAS {% if run_script_results.failed %}FAIL{% else %}OK{% endif %}!


    - name: save logfile to server
      copy:
        dest: "{{logfile_path}}"
        content: "{{run_script_log}}"

    # NOTE: using 'fetch' because 'copy' does not create missing directories in the dest path
    - name: save logfile locally
      fetch:
        src: "{{logfile_path}}"
        dest: "{{local_logfile_path}}"
        flat: true # "dest" is already unique, keep ansible from prepending hostname and remote path
        fail_on_missing: no
      register: local_logfile

    - debug: {var: server_logfile}
    - debug: {var: local_logfile}

    - name: print log
      debug:
        msg: |
          LOG TEXT:

          {{run_script_log}}

          ---

          LOG FILE PATHS:
          * on server: {% if server_logfile.dest is defined %}{{server_logfile.dest}}{% endif %}

          * on local: {% if local_logfile.dest is defined %}{{local_logfile.dest}}{% endif %}



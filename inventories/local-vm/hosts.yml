all:

  vars:
    ip_trixie: 10.211.55.33
    ip_bookworm: 10.211.55.29
    ip_jammy: 10.211.55.34
    ip_resolute: 10.211.55.35
    database_password: "top_secret_password"

  hosts:
    trixie: # Debian 13 (trixie)
      ansible_host: "{{ ip_trixie }}"
    bookworm: # Debian 12 (bookworm)
      ansible_host: "{{ ip_bookworm }}"
    jammy: # Ubuntu 22.04 LTS
      ansible_host: "{{ ip_jammy }}"
    resolute: # Ubuntu 26.04 LTS (resolute)
      ansible_host: "{{ ip_resolute }}"

  children:

    leihs_server:
      vars:
        leihs_external_hostname: "{{ ansible_host }}"
        leihs_external_base_url: "http://{{leihs_external_hostname}}"
        ansible_user: root
        leihs_send_mails: No
        db_backup_on_deploy: No
        db_backup_nightly_enabled: No

      hosts:
        trixie:
        bookworm:
        jammy:
        resolute:
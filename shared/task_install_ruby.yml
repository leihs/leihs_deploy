- name: install ruby via mise
  shell: |
    #!/bin/bash
    set -euo pipefail
    cd "{{ working_dir | mandatory }}"
    mise trust /leihs/mise.toml
    mise install ruby
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{ task_become_user | mandatory }}" # fail if not given where task is imported!
  become_method: sudo
  # this task might take longer than ssh timeout! run in background for up to 1h and poll every 10 seconds:
  async: 3600
  poll: 10

<VirtualHost *>
  # ServerAdmin admin@example.org
  # ServerName  example.org
  # ServerAlias example.org

  # answer with 503 status and the custom error page for every request:
  DocumentRoot /var/www/leihs-maintenance/
  ErrorDocument 503 /503.html
  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/503.html$
  RewriteRule .* - [R=503]

  # disable all kinds of caching:
  Header unset ETag
  Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
  Header set Pragma "no-cache"
  Header set Expires "Mon, 01 Jan 2001 00:00:00 GMT"

  # tell web crawlers to try again in 1 hour:
  Header always set Retry-After "3600"

# {% if reverse_proxy_custom_ssl_config is defined %}
#   RewriteCond %{SERVER_NAME} ={{virtual_host.hostname}}
#   RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,QSA,R=permanent]
# {% endif %}

</VirtualHost>

<VirtualHost *:443>
  # answer with 503 status and the custom error page for every request:
  DocumentRoot /var/www/leihs-maintenance/
  ErrorDocument 503 /503.html
  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/503.html$
  RewriteRule .* - [R=503]

  # disable all kinds of caching:
  Header unset ETag
  Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
  Header set Pragma "no-cache"
  Header set Expires "Mon, 01 Jan 2001 00:00:00 GMT"

  # tell web crawlers to try again in 1 hour:
  Header always set Retry-After "3600"

  SSLEngine on
{% if reverse_proxy_custom_ssl_config is defined %}
{{reverse_proxy_custom_ssl_config}}
{% else %}
{% if has_letsencrypt_cert %}
  SSLCertificateFile /etc/letsencrypt/live/{{leihs_external_hostname}}/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/{{leihs_external_hostname}}/privkey.pem
{% endif %}
{% endif %}

  SSLProxyEngine on
  SSLProxyVerify none
  SSLProxyCheckPeerCN off
  SSLProxyCheckPeerName off

  Header always set X-Content-Type-Options nosniff

</VirtualHost>
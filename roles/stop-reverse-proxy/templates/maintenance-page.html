<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ maintenance_page.title | default("Leihs Maintenance") }}</title>
  <style>
    body {
      text-align: center;
      font-size: 1.5rem;
      line-height: 1.35;
      color: rgba(0, 0, 0, 0.8);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }
  
    main {
      height: 100vh;
      width: 100%;
      display: table;
    }
  
    article {
      padding: 2rem;
      display: table-cell;
      vertical-align: middle;
    }
  
    h1 {
      margin: 0;
      font-size: 3rem
    }
  </style>
</head>
<body>
  
<main>
  <article>
    <h1>{{ maintenance_page.heading | default("Leihs will be back soon!") }}</h1>
    {% for line in maintenance_page.body_paragraphs_html %}
    <p>{{ line }}</p>
    {% endfor %}
  </article>
</main>

</body>
</html>

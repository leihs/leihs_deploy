- name: get ruby dir from mise
  shell: |
    set -euo pipefail
    cd {{leihs_legacy_dir}}
    mise where ruby
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{leihs_legacy_user}}"
  become_method: sudo
  changed_when: false
  failed_when: false
  register: leihs_legacy_mise_ruby_dir_result

- name: set ruby dir fact
  set_fact:
    leihs_legacy_ruby_dir: "{{ leihs_legacy_mise_ruby_dir_result.stdout if leihs_legacy_mise_ruby_dir_result.rc == 0 else '/usr' }}"

- name: template puma config
  template:
    owner: "{{leihs_legacy_user}}"
    src: puma.rb
    dest: '{{leihs_legacy_dir}}/config/puma.rb'
    mode: 0644

- template:
    src: leihs-legacy.service
    dest: /etc/systemd/system/leihs-legacy.service
    mode: 0644
  name: copy  leihs-legacy.service

- template:
    src: leihs-legacy-cron.service
    dest: /etc/systemd/system/leihs-legacy-cron.service
    mode: 0644
  name: install leihs-legacy-cron.service

- template:
    src: leihs-legacy-cron.timer
    dest: /etc/systemd/system/leihs-legacy-cron.timer
    mode: 0644
  name: install leihs-legacy-cron.timer

- command: systemctl daemon-reload
  changed_when: false
  name: reload systemctl

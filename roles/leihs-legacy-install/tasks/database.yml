- copy:
    content: |
      production:
        adapter: postgresql
        host: {{database_host}}
        port: {{database_port}}
        pool: 25
        encoding: unicode
        username: {{database_username}}
        password: {{database_password}}
        database: {{database_name}}
    dest: "{{leihs_legacy_dir}}/config/database.yml"
  name: configure legacy database

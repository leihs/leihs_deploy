- file:
    path: '{{leihs_procurement_dir}}/logs'
    state: directory
    owner: '{{leihs_procurement_user}}'
    recurse: yes
  name: create empty leihs-procurement logs dir

- file:
    path: '{{leihs_procurement_dir}}'
    state: directory
    owner: '{{leihs_procurement_user}}'
    recurse: yes
  name: set permissions for leihs-procurement dir

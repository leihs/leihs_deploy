# NOTE: we force our wanted version of PostgreSQL by removing the Debian-provided `pg_wrapper` and linking used cli tools directly

- name: Uninstall newer postgresql versions
  apt:
    pkg:
    - postgresql-11
    - postgresql-client-11
    - postgresql-12
    - postgresql-client-12
    - postgresql-13
    - postgresql-client-13
    state: absent
    update_cache: yes
    cache_valid_time: 3600
  tags: [internet]

- name: Install psycopg2
  apt:
    pkg: python-psycopg2
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: >
    not (ansible_distribution == "Ubuntu"
    and ansible_distribution_release == "focal")

- name: Install psycopg2
  apt:
    pkg: python3-psycopg2
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: >
    (ansible_distribution == "Ubuntu"
    and ansible_distribution_release == "focal")

- name: Install postgresql
  apt:
    pkg:
    - postgresql-10
    - postgresql-client-10
    - postgresql-contrib-10
    - libpq-dev
    - sudo
    state: present
    update_cache: yes
    cache_valid_time: 3600
  tags: [internet]

- name: remove `pg_wrapper`
  file:
    path: "/usr/share/postgresql-common/pg_wrapper"
    state: absent

- name: set default postgresql version 10 for cli tools
  vars:
    postgres_version: 10 # NOTE: if needed this can just move to global vars
  file:
    src: "/usr/lib/postgresql/{{postgres_version}}/bin/{{item}}"
    dest: "/usr/bin/{{item}}"
    state: link
    force: yes
  with_items:
    - psql
    - pg_dump
    - pg_restore
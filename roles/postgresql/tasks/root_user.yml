- name: add root postgresql user
  become: yes
  become_user: postgres
  postgresql_user:
    name: root
    login_port: 5415
    role_attr_flags: CREATEDB,SUPERUSER
    password: "{{database_password}}"
  tags: debug

- postgresql_db:
    name: root
    login_user: root
    login_port: 5415
    owner: root
  name: Create the a database for root
